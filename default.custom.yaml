customization:
  distribution_code_name: Weasel
  distribution_version: 0.17.4
  generator: "Rime::SwitcherSettings"
  modified_time: "Mon Jan 26 19:46:41 2026"
  rime_version: 1.13.1
patch:
  "key_binder/bindings/+":
    - { accept: comma, send: Page_Up, when: paging }
    - { accept: period, send: Page_Down, when: has_menu }
    # - { accept: period, send: Page_Down, when: paging }

    # 缩小全角半角和简繁切换 的快捷键生效范围(全局容易影响)
    # - { accept: "Control+Shift+3", toggle: full_shape, when: never }
    # - { accept: "Control+Shift+4", toggle: simplification, when: never }
    # - { accept: "Control+Shift+3", toggle: full_shape, when: composing }
    # - { accept: "Control+Shift+4", toggle: simplification, when: composing }
    # - { accept: "Control+Shift+3", toggle: full_shape, when: never }
    # - { accept: "Control+Shift+4", toggle: simplification, when: never }
    # - { accept: "Control+Shift+3", toggle: ascii_punct, when: composing }
    # - { accept: "Control+Shift+4", toggle: traditionalization, when: composing }
    #

    - { when: never, toggle: ascii_punct, accept: Control+Shift+3 } # 切换中英标点
    - { when: never, toggle: ascii_punct, accept: Control+Shift+numbersign } # 切换中英标点
    - { when: never, toggle: traditionalization, accept: Control+Shift+4 } # 切换简繁
    - { when: never, toggle: traditionalization, accept: Control+Shift+dollar }
    - { when: never, toggle: full_shape, accept: Control+Shift+5 } # 切换全半角
    - { when: never, toggle: full_shape, accept: Control+Shift+percent } # 切换全半角

    - { when: composing, toggle: ascii_punct, accept: Control+Shift+3 } # 切换中英标点
    - { when: composing, toggle: ascii_punct, accept: Control+Shift+numbersign } # 切换中英标点
    - { when: composing, toggle: traditionalization, accept: Control+Shift+4 } # 切换简繁
    - {
        when: composing,
        toggle: traditionalization,
        accept: Control+Shift+dollar,
      }
    - { when: composing, toggle: full_shape, accept: Control+Shift+5 } # 切换全半角
    - { when: composing, toggle: full_shape, accept: Control+Shift+percent } # 切换全半角

  layout:
    max_height: 0
    max_width: 40
    min_height: 0
    min_width: 25
  "menu/page_size": 10
  schema_list:
    - { schema: rime_ice }
    - { schema: double_pinyin_flypy }
    - { schema: double_pinyin }
  style:
    border_height: 0
    border_width: 0
    candidate_format: "%c %@"
    color_scheme: aqua
    corner_radius: 6
    dpi_aware: true
    font_face: "Microsoft YaHei"
    font_point: 20
    line_spacing: 1.3
    spacing: 10
