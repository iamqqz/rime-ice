patch:
  # 候选词个数
  menu/page_size: 10
  # 候选窗样式
  style:
    # 字体设置
    font_face: "Microsoft YaHei" # 微软雅黑（支持中文）
    font_point: 18 # 字号（14～18 推荐）

    # 颜色主题（可选：aqua / clean / dark / ink 等）
    color_scheme: aqua

    # 布局与间距
    corner_radius: 6 # 圆角
    border_width: 0
    border_height: 0
    spacing: 10 # 候选项垂直间距
    line_spacing: 1.3 # 行高倍数

    # 候选格式：显示编号 + 文字（如 "1. 中国"）
    candidate_format: "%c. %@"

    # 高 DPI 支持（Win10/11 必开，避免模糊）
    dpi_aware: true

  # 候选窗尺寸（关键！）
  layout:
    min_width: 25 # 最小宽度（字符数）
    max_width: 40 # 最大宽度（防止过宽）
    min_height: 0 # 高度由 page_size 决定
    max_height: 0

  # 按键绑定 - 逗号句号翻页
  key_binder/bindings/+:
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
